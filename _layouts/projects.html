---
layout: default
---
<div class="page-container" style="max-width: 760px;">
  {% include nav.html %}

  <header class="page-header">
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p>{{ page.subtitle }}</p>{% endif %}
  </header>

  {% for p in site.data.projects %}
    <article class="proj-item">
      <div class="head">
        <h3><a href="{{ p.url }}">{{ p.name }}</a></h3>
        <span class="status {{ p.status }}">
          <span class="dot"></span>{{ p.status }}
        </span>
        <span class="tag">{{ p.tag }}</span>
      </div>
      <p class="blurb">{{ p.blurb }}</p>
      <div class="stack">
        {% for s in p.stack %}<span>{{ s }}</span>{% endfor %}
      </div>
    </article>
  {% endfor %}

  {% include footer.html %}
</div>
