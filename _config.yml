title: Djamel Mesbah
tagline: PhD candidate · deep learning, code, ML systems
description: >-
  Notes on deep learning, distributed training, ML systems, and software
  engineering. PhD research on automated code quality assessment.

url: "https://kheims.github.io"
baseurl: ""
lang: en
timezone: Europe/Paris

author:
  name: Djamel Mesbah
  email: djamelmesbah141@gmail.com

social:
  github: kheims
  linkedin: djamel-mesbah
  scholar:
  email: djamelmesbah141@gmail.com

plugins:
  - jekyll-archives
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: false

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /posts/:title/
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/
  - scope:
      path: ""
      type: pages
    values:
      layout: page

jekyll-archives:
  enabled: [tags, categories]
  layouts:
    tag: tag
    category: category
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

sass:
  style: compressed
  sass_dir: _sass

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - README.md
  - LICENSE
  - tools
  - test-lottie.html
  - "*.gem"
  - "*.gemspec"

giscus:
  repo: Kheims/kheims.github.io
  repo_id: R_kgDONvWGnQ
  category: Blog comments
  category_id: DIC_kwDONvWGnc4C7hkg
